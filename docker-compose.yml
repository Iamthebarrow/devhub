services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: devhub
      POSTGRES_USER: devhub
      POSTGRES_PASSWORD: devhub_local_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devhub -d devhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: always
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      VERSION: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  backend:
    build:
      context: ./backend/devhub-backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/devhub-backend:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      RUN_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; import sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/').status == 200 else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend/devhub-backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./backend/devhub-backend:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
    command: celery -A config worker -l INFO --concurrency=2

  frontend:
    build:
      context: ./frontend/devhub-frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/devhub-frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
